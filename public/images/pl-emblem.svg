<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1b2d4a"/>
    </linearGradient>
    <clipPath id="shape">
      <!-- Top-left rounded, top-right sharp, bottom-right rounded, bottom-left sharp -->
      <path d="M20,0 L120,0 L120,100 Q120,120 100,120 L0,120 L0,20 Q0,0 20,0 Z"/>
    </clipPath>
  </defs>
  <!-- Background shape: 2 rounded corners (TL + BR), 2 sharp corners (TR + BL) -->
  <path d="M20,0 L120,0 L120,100 Q120,120 100,120 L0,120 L0,20 Q0,0 20,0 Z" fill="url(#bgGrad)"/>
  <!-- Light blue accent bar at bottom -->
  <rect x="0" y="88" width="120" height="32" fill="#5bafe6" clip-path="url(#shape)"/>
  <!-- PL text -->
  <text x="50%" y="55" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="68" fill="#ffffff" letter-spacing="-2">PL</text>
</svg>
